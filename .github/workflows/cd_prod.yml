name: Prod server Spring CD with Gradle and Docker

# 동작 조건 설정 : prod 브랜치에 push가 발생할 경우 동작한다.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ex. 0.1.0)'
        required: true
        type: string
#  push:
#    branches: [ "feature/KDE-55/cd" ]

permissions:
  contents: read

env:
  VERSION: ${{ inputs.version }}
  IMAGE_NAME: kookdonge-server:${{ inputs.version }}

jobs: # 각 Job은 서로 다른 가상머신에서 실행됨
  # Spring Boot 애플리케이션을 빌드하여 도커허브에 푸시하는 과정
  build-docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Java 21 세팅
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Decode base64 config and write to file
        run: |
          echo "${{ secrets.CONFIG_PROD_BASE64 }}" | base64 --decode > src/main/resources/application-prod.yml

      # excute 허용
      - name: Run chmod to make gradlew executable
        run: chmod +x ./gradlew

      # 2. Spring Boot 애플리케이션 빌드
      - name: Build with Gradle
        run: ./gradlew clean build -Dspring.profiles.active=prod --exclude-task test

      # 3. Docker 이미지 빌드
      - name: Create prod Dockerfile
        run: |
          printf '%s\n' \
          'FROM openjdk:21-jdk' \
          'ENV JAVA_TOOL_OPTIONS="-Xms2048m -Xmx2048m"' \
          'ARG JAR_FILE=build/libs/*.jar' \
          'COPY ${JAR_FILE} app.jar' \
          'EXPOSE 8080' \
          'ENTRYPOINT ["java", "-Dspring.profiles.active=prod", "-jar", "/app.jar"]' \
          > Dockerfile-prod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker buildx build \
          --platform linux/arm64 \
          -f Dockerfile-prod \
          -t ${IMAGE_NAME} \
          --load .

      # 4. DockerHub 로그인
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD_PROD }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME_PROD }} --password-stdin

      - name: Tag Docker Image
        run: docker tag ${IMAGE_NAME} ${{ secrets.DOCKERHUB_USERNAME_PROD }}/kookdonge-server:${VERSION}

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME_PROD }}/kookdonge-server:${VERSION}

  run-docker-image-on-ec2:
    # build-docker-image (위)과정이 완료되어야 실행됩니다.
    needs: build-docker-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.PROD_EC2_KEY }}

      - name: Run deployment script
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60  -o ServerAliveCountMax=2 ubuntu@${{ secrets.PROD_EC2_IP }} << EOF
          echo "${{ secrets.DOCKERHUB_PASSWORD_PROD }}" | sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME_PROD }} --password-stdin
          sudo docker pull ${{ secrets.DOCKERHUB_USERNAME_PROD }}/kookdonge-server:${{ inputs.version }}
          sudo docker stop kookdonge-server 2>/dev/null || true
          sudo docker rm kookdonge-server 2>/dev/null || true
          sudo docker run --name kookdonge-server -v logs:/logs -d -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME_PROD }}/kookdonge-server:${{ inputs.version }}
          sudo chmod -R 777 logs
          sudo docker system prune -f
          EOF